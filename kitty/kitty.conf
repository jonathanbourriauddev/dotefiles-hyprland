# Kitty config with Catppuccin Mocha

# Font
font_family monospace
font_size 12
font_feature_cv01 1

# Window
window_padding_width 8
window_margin_width 0

# Cursor
cursor_shape block

# Bell
enable_audio_bell no

# Scrollback
scrollback_lines 10000

# Colors - Catppuccin Mocha
foreground #cdd6f4
background #1e1e2e
selection_foreground #1e1e2e
selection_background #f5c2e7

# Cursor
cursor #f5c2e7
cursor_text_color #1e1e2e

# URLs
url_color #89dceb

# Colors
color0 #45475a
color1 #f38ba8
color2 #a6e3a1
color3 #f9e2af
color4 #89b4fa
color5 #f5c2e7
color6 #94e2d5
color7 #bac2de
color8 #585b70
color9 #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #a6adc8

# Opacity
background_opacity 0.9

# Cursor
cursor_shape beam
cursor_beam_thickness 1.5
cursor_trail 3

shell /usr/bin/fish
